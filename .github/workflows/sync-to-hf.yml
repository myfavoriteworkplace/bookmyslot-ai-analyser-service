name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'bookmyslot-ai-service/**'

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push bookmyslot-ai-service subfolder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Create a new repo with only the bookmyslot-ai-service folder at root
          mkdir -p /tmp/hf-deploy
          cd /tmp/hf-deploy
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          # Copy the bookmyslot-ai-service folder contents
          cp -r $GITHUB_WORKSPACE/bookmyslot-ai-service/* .
          
          # Add all files and commit
          git add .
          git commit -m "Deploy bookmyslot-ai-service to HF Space"
          
          # Push to Hugging Face
          git push \
            --force \
            https://itsmyfavoriteworkplace:$HF_TOKEN@huggingface.co/spaces/itsmyfavoriteworkplace/bookmyslot-ai-service \
            HEAD:main

      - name: Smoke test — wait for Space to rebuild then ping health check
        run: |
          echo "Waiting 60 seconds for HF Space to start rebuilding..."
          sleep 60
          MAX_ATTEMPTS=10
          ATTEMPT=0
          URL="https://itsmyfavoriteworkplace-bookmyslot-ai-service.hf.space/"
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT / $MAX_ATTEMPTS — pinging $URL"
            RESPONSE=$(curl --silent --max-time 30 --write-out "\n%{http_code}" "$URL" 2>&1 || echo "CURL_FAILED")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            
            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q "running"; then
              echo "✅ Health check passed — service is running"
              echo "Response: $BODY"
              exit 0
            fi
            echo "Status: $HTTP_CODE | Response: $BODY"
            sleep 30
          done
          echo "❌ Service did not become healthy after $MAX_ATTEMPTS attempts"
          exit 1
